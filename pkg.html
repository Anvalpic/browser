<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBrowser — Browser Kamu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #161821;
    --bg-tertiary: #1c1f2e;
    --bg-hover: #252839;
    --bg-active: #2d3148;
    --fg-primary: #e8eaf0;
    --fg-secondary: #8b8fa3;
    --fg-muted: #555872;
    --accent: #00d4aa;
    --accent-hover: #00f0c0;
    --accent-dim: rgba(0,212,170,0.12);
    --accent-glow: rgba(0,212,170,0.25);
    --danger: #ff4757;
    --warning: #ffa502;
    --border: #2a2d40;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-primary);
    color: var(--fg-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== TITLE BAR ===== */
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .title-bar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .browser-logo {
    width: 18px; height: 18px;
    background: linear-gradient(135deg, var(--accent), #0077ff);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #000;
  }
  .title-bar-text {
    font-size: 12px;
    color: var(--fg-secondary);
    font-weight: 500;
  }
  .window-controls {
    display: flex; gap: 8px;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: var(--transition);
    opacity: 0.8;
  }
  .win-btn:hover { opacity: 1; transform: scale(1.15); }
  .win-btn.minimize { background: var(--warning); }
  .win-btn.maximize { background: var(--accent); }
  .win-btn.close { background: var(--danger); }

  /* ===== TAB BAR ===== */
  .tab-bar {
    display: flex;
    align-items: flex-end;
    height: 40px;
    background: var(--bg-secondary);
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 34px;
    padding: 0 14px;
    background: var(--bg-tertiary);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    min-width: 120px;
    max-width: 220px;
    transition: var(--transition);
    position: relative;
    flex-shrink: 0;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .tab:hover { background: var(--bg-hover); }
  .tab.active {
    background: var(--bg-primary);
    border-color: var(--border);
    z-index: 2;
  }
  .tab-favicon {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--fg-muted);
  }
  .tab-favicon img { width: 14px; height: 14px; border-radius: 3px; }
  .tab-title {
    font-size: 12px;
    color: var(--fg-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .tab.active .tab-title { color: var(--fg-primary); }
  .tab-close {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
    opacity: 0;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--danger); color: #fff; }

  .tab-new {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .tab-new:hover { background: var(--bg-hover); color: var(--accent); }

  /* ===== NAVIGATION BAR ===== */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 46px;
    background: var(--bg-primary);
    padding: 0 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .nav-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--fg-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--bg-hover); color: var(--fg-primary); }
  .nav-btn:active { transform: scale(0.92); }
  .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

  .url-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }
  .url-lock {
    position: absolute;
    left: 12px;
    font-size: 12px;
    color: var(--accent);
    z-index: 2;
  }
  .url-input {
    width: 100%;
    height: 34px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--fg-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 0 40px 0 34px;
    outline: none;
    transition: var(--transition);
  }
  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
    background: var(--bg-secondary);
  }
  .url-input::placeholder { color: var(--fg-muted); }

  .url-actions {
    position: absolute;
    right: 6px;
    display: flex;
    gap: 2px;
  }
  .url-action-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .url-action-btn:hover { background: var(--bg-hover); color: var(--fg-primary); }
  .url-action-btn.bookmarked { color: var(--warning); }

  .nav-right {
    display: flex; gap: 4px;
  }

  /* ===== BOOKMARKS BAR ===== */
  .bookmarks-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 32px;
    background: var(--bg-secondary);
    padding: 0 10px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .bookmarks-bar::-webkit-scrollbar { display: none; }
  .bookmark-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .bookmark-item:hover { background: var(--bg-hover); }
  .bookmark-item i { font-size: 11px; color: var(--accent); }
  .bookmark-item span { font-size: 11px; color: var(--fg-secondary); }
  .bookmark-item:hover span { color: var(--fg-primary); }

  /* ===== LOADING BAR ===== */
  .loading-bar {
    height: 2px;
    background: transparent;
    flex-shrink: 0;
    overflow: hidden;
  }
  .loading-bar.active { background: var(--bg-tertiary); }
  .loading-bar .progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #0077ff);
    border-radius: 0 2px 2px 0;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* ===== CONTENT AREA ===== */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .browser-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
    display: none;
  }
  .browser-frame.active { display: block; }

  /* ===== HOME PAGE ===== */
  .home-page {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8vh;
    background: var(--bg-primary);
    position: absolute;
    top: 0; left: 0;
    overflow-y: auto;
  }
  .home-page.active { display: flex; }

  .home-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .home-bg .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    animation: orbFloat 12s ease-in-out infinite;
  }
  .home-bg .orb:nth-child(1) {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -10%; left: -10%;
    animation-delay: 0s;
  }
  .home-bg .orb:nth-child(2) {
    width: 400px; height: 400px;
    background: #0077ff;
    bottom: -10%; right: -10%;
    animation-delay: -4s;
  }
  .home-bg .orb:nth-child(3) {
    width: 300px; height: 300px;
    background: #ff4757;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -8s;
    opacity: 0.08;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .home-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 680px;
    padding: 0 20px;
  }

  .home-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), #0077ff);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #000;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px var(--accent-glow);
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 8px 40px var(--accent-glow); }
    50% { box-shadow: 0 8px 60px rgba(0,212,170,0.4); }
  }

  .home-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--fg-primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .home-subtitle {
    font-size: 13px;
    color: var(--fg-muted);
    margin-bottom: 28px;
  }

  .home-search {
    width: 100%;
    position: relative;
    margin-bottom: 36px;
  }
  .home-search input {
    width: 100%;
    height: 50px;
    border-radius: 25px;
    border: 1.5px solid var(--border);
    background: var(--bg-secondary);
    color: var(--fg-primary);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    padding: 0 50px 0 48px;
    outline: none;
    transition: var(--transition);
  }
  .home-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-dim), 0 12px 40px rgba(0,0,0,0.3);
    background: var(--bg-tertiary);
  }
  .home-search input::placeholder { color: var(--fg-muted); }
  .home-search .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    font-size: 15px;
  }
  .home-search .search-go {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #000;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .home-search .search-go:hover { background: var(--accent-hover); transform: translateY(-50%) scale(1.08); }

  .search-engine-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
  }
  .se-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--fg-secondary);
    font-size: 12px;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
  }
  .se-btn:hover { border-color: var(--fg-muted); }
  .se-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .se-btn img { width: 14px; height: 14px; border-radius: 2px; }

  .shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 80px);
    gap: 16px;
    justify-content: center;
    width: 100%;
    margin-bottom: 30px;
  }
  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: var(--transition);
    padding: 10px 4px;
    border-radius: var(--radius);
  }
  .shortcut:hover { background: var(--bg-hover); transform: translateY(-2px); }
  .shortcut-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: var(--transition);
  }
  .shortcut:hover .shortcut-icon {
    border-color: var(--accent);
    box-shadow: 0 4px 16px var(--accent-dim);
  }
  .shortcut-name {
    font-size: 11px;
    color: var(--fg-secondary);
    text-align: center;
    max-width: 72px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ===== SIDEBAR PANELS ===== */
  .sidebar-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .sidebar-overlay.active { opacity: 1; pointer-events: all; }

  .sidebar {
    position: fixed;
    top: 0;
    right: -380px;
    width: 380px;
    height: 100vh;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    z-index: 101;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  .sidebar.active { right: 0; }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h3 {
    font-size: 16px;
    font-weight: 600;
  }
  .sidebar-close {
    width: 30px; height: 30px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--fg-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .sidebar-close:hover { background: var(--bg-hover); color: var(--fg-primary); }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-track { background: transparent; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Panel items */
  .panel-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 2px;
  }
  .panel-item:hover { background: var(--bg-hover); }
  .panel-item-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .panel-item-info { flex: 1; min-width: 0; }
  .panel-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-item-url {
    font-size: 11px;
    color: var(--fg-muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-item-time {
    font-size: 10px;
    color: var(--fg-muted);
    flex-shrink: 0;
  }
  .panel-item-delete {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    opacity: 0;
    flex-shrink: 0;
  }
  .panel-item:hover .panel-item-delete { opacity: 1; }
  .panel-item-delete:hover { background: rgba(255,71,87,0.15); color: var(--danger); }

  .panel-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--fg-muted);
    font-size: 13px;
  }
  .panel-empty i { font-size: 36px; margin-bottom: 12px; display: block; opacity: 0.4; }

  /* ===== SETTINGS PANEL ===== */
  .settings-section {
    margin-bottom: 24px;
  }
  .settings-section h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-muted);
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: var(--bg-tertiary);
    margin-bottom: 6px;
  }
  .settings-row label {
    font-size: 13px;
    color: var(--fg-secondary);
  }
  .toggle {
    width: 40px; height: 22px;
    border-radius: 11px;
    background: var(--bg-hover);
    border: none;
    cursor: pointer;
    position: relative;
    transition: var(--transition);
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--fg-muted);
    top: 3px; left: 3px;
    transition: var(--transition);
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { left: 21px; background: #000; }

  .settings-select {
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--fg-primary);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    outline: none;
  }

  /* ===== CONTEXT MENU ===== */
  .context-menu {
    position: fixed;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    min-width: 180px;
    z-index: 200;
    box-shadow: var(--shadow);
    display: none;
  }
  .context-menu.show { display: block; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--fg-secondary);
    transition: var(--transition);
  }
  .ctx-item:hover { background: var(--bg-hover); color: var(--fg-primary); }
  .ctx-item i { width: 16px; text-align: center; font-size: 12px; }
  .ctx-divider { height: 1px; background: var(--border); margin: 4px 8px; }

  /* ===== TOAST ===== */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 20px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--fg-primary);
    box-shadow: var(--shadow);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    display: flex; align-items: center; gap: 10px;
  }
  .toast i { color: var(--accent); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(10px); } }

  /* ===== STATUS BAR ===== */
  .status-bar {
    height: 24px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 11px;
    color: var(--fg-muted);
    flex-shrink: 0;
  }
  .status-bar .status-left {
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .status-bar .status-right {
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== FIND BAR ===== */
  .find-bar {
    position: absolute;
    top: 0; right: 20px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 8px 12px;
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 50;
    box-shadow: var(--shadow);
  }
  .find-bar.active { display: flex; }
  .find-bar input {
    width: 200px;
    height: 28px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--fg-primary);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    padding: 0 10px;
    outline: none;
  }
  .find-bar input:focus { border-color: var(--accent); }
  .find-bar span { font-size: 11px; color: var(--fg-muted); min-width: 40px; }
  .find-bar button {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--fg-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: var(--transition);
  }
  .find-bar button:hover { background: var(--bg-hover); color: var(--fg-primary); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 640px) {
    .sidebar { width: 100%; right: -100%; }
    .home-title { font-size: 22px; }
    .shortcuts-grid { grid-template-columns: repeat(auto-fill, 70px); gap: 10px; }
    .search-engine-selector { flex-wrap: wrap; justify-content: center; }
    .nav-btn.hide-mobile { display: none; }
  }
</style>
</head>
<body>

<!-- TITLE BAR -->
<div class="title-bar">
  <div class="title-bar-left">
    <div class="browser-logo">N</div>
    <span class="title-bar-text" id="titleBarText">NovaBrowser</span>
  </div>
  <div class="window-controls">
    <button class="win-btn minimize" title="Minimize"></button>
    <button class="win-btn maximize" title="Maximize"></button>
    <button class="win-btn close" title="Tutup"></button>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar" id="tabBar">
  <button class="tab-new" id="newTabBtn" title="Tab Baru"><i class="fas fa-plus"></i></button>
</div>

<!-- NAVIGATION BAR -->
<div class="nav-bar">
  <button class="nav-btn" id="btnBack" title="Kembali"><i class="fas fa-arrow-left"></i></button>
  <button class="nav-btn" id="btnForward" title="Maju"><i class="fas fa-arrow-right"></i></button>
  <button class="nav-btn" id="btnRefresh" title="Muat Ulang"><i class="fas fa-rotate-right"></i></button>
  <button class="nav-btn" id="btnHome" title="Beranda"><i class="fas fa-house"></i></button>

  <div class="url-container">
    <i class="url-lock fas fa-lock" id="urlLock"></i>
    <input type="text" class="url-input" id="urlInput" placeholder="Ketik URL atau pencarian..." autocomplete="off" spellcheck="false">
    <div class="url-actions">
      <button class="url-action-btn" id="btnBookmark" title="Bookmark"><i class="far fa-star"></i></button>
      <button class="url-action-btn" id="btnDirectOpen" title="Buka di Tab Baru (Direct)"><i class="fas fa-external-link-alt"></i></button>
    </div>
  </div>

  <div class="nav-right">
    <button class="nav-btn hide-mobile" id="btnFind" title="Cari di Halaman"><i class="fas fa-magnifying-glass"></i></button>
    <button class="nav-btn" id="btnDownloads" title="Unduhan"><i class="fas fa-download"></i></button>
    <button class="nav-btn" id="btnBookmarksPanel" title="Bookmark"><i class="fas fa-bookmark"></i></button>
    <button class="nav-btn" id="btnHistory" title="Riwayat"><i class="fas fa-clock-rotate-left"></i></button>
    <button class="nav-btn" id="btnSettings" title="Pengaturan"><i class="fas fa-gear"></i></button>
    <button class="nav-btn" id="btnMenu" title="Menu"><i class="fas fa-ellipsis-vertical"></i></button>
  </div>
</div>

<!-- BOOKMARKS BAR -->
<div class="bookmarks-bar" id="bookmarksBar"></div>

<!-- LOADING BAR -->
<div class="loading-bar" id="loadingBar"><div class="progress" id="loadingProgress"></div></div>

<!-- CONTENT AREA -->
<div class="content-area" id="contentArea">
  <!-- Tab frames dimasukkan secara dinamis -->

  <!-- Find Bar -->
  <div class="find-bar" id="findBar">
    <input type="text" placeholder="Cari di halaman..." id="findInput">
    <span id="findCount">0/0</span>
    <button id="findPrev"><i class="fas fa-chevron-up"></i></button>
    <button id="findNext"><i class="fas fa-chevron-down"></i></button>
    <button id="findClose"><i class="fas fa-xmark"></i></button>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-left">
    <div class="status-dot"></div>
    <span id="statusText">Siap</span>
  </div>
  <div class="status-right">
    <span id="statusZoom">100%</span>
    <span id="statusTime"></span>
  </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3 id="sidebarTitle">Panel</h3>
    <button class="sidebar-close" id="sidebarClose"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="sidebar-body" id="sidebarBody"></div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu">
  <div class="ctx-item" data-action="newTab"><i class="fas fa-plus"></i> Tab Baru</div>
  <div class="ctx-item" data-action="reload"><i class="fas fa-rotate-right"></i> Muat Ulang</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" data-action="bookmark"><i class="fas fa-star"></i> Bookmark Halaman Ini</div>
  <div class="ctx-item" data-action="copyUrl"><i class="fas fa-copy"></i> Salin URL</div>
  <div class="ctx-item" data-action="directOpen"><i class="fas fa-external-link-alt"></i> Buka Langsung di Tab Baru</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" data-action="clearHistory"><i class="fas fa-trash"></i> Bersihkan Riwayat</div>
  <div class="ctx-item" data-action="settings"><i class="fas fa-gear"></i> Pengaturan</div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
  /* ========================================================
     NovaBrowser — Browser Kamu Sendiri
     Fitur: Tab, Navigasi, Bookmark, Riwayat, Search Engine,
            Direct Navigation, Find, Download, Settings, dll.
  ======================================================== */

  // ===== STATE =====
  const state = {
    tabs: [],
    activeTabId: null,
    nextTabId: 1,
    bookmarks: JSON.parse(localStorage.getItem('nb_bookmarks') || '[]'),
    history: JSON.parse(localStorage.getItem('nb_history') || '[]'),
    settings: JSON.parse(localStorage.getItem('nb_settings') || JSON.stringify({
      searchEngine: 'google',
      showBookmarksBar: true,
      showStatusbar: true,
      homepage: 'nova://home'
    })),
    sidebarOpen: false,
    sidebarPanel: null,
    contextMenuVisible: false
  };

  // ===== DEFAULT SHORTCUTS =====
  const defaultShortcuts = [
    { name: 'Google', url: 'https://www.google.com', icon: 'fab fa-google', color: '#4285f4' },
    { name: 'YouTube', url: 'https://www.youtube.com', icon: 'fab fa-youtube', color: '#ff0000' },
    { name: 'Wikipedia', url: 'https://id.wikipedia.org', icon: 'fab fa-wikipedia-w', color: '#666' },
    { name: 'GitHub', url: 'https://github.com', icon: 'fab fa-github', color: '#ccc' },
    { name: 'Reddit', url: 'https://www.reddit.com', icon: 'fab fa-reddit', color: '#ff4500' },
    { name: 'Twitter', url: 'https://x.com', icon: 'fab fa-x-twitter', color: '#fff' },
    { name: 'Stack OF', url: 'https://stackoverflow.com', icon: 'fab fa-stack-overflow', color: '#f48024' },
    { name: 'DuckDuckGo', url: 'https://duckduckgo.com', icon: 'fas fa-search', color: '#de5833' },
  ];

  const searchEngines = {
    google: { name: 'Google', url: 'https://www.google.com/search?q=', icon: 'fab fa-google' },
    duckduckgo: { name: 'DuckDuckGo', url: 'https://duckduckgo.com/?q=', icon: 'fas fa-search' },
    bing: { name: 'Bing', url: 'https://www.bing.com/search?q=', icon: 'fab fa-microsoft' },
    youtube: { name: 'YouTube', url: 'https://www.youtube.com/results?search_query=', icon: 'fab fa-youtube' },
  };

  // ===== DOM REFERENCES =====
  const $ = id => document.getElementById(id);
  const tabBar = $('tabBar');
  const newTabBtn = $('newTabBtn');
  const urlInput = $('urlInput');
  const urlLock = $('urlLock');
  const contentArea = $('contentArea');
  const loadingBar = $('loadingBar');
  const loadingProgress = $('loadingProgress');
  const statusText = $('statusText');
  const statusZoom = $('statusZoom');
  const statusTime = $('statusTime');
  const titleBarText = $('titleBarText');
  const bookmarksBar = $('bookmarksBar');
  const sidebar = $('sidebar');
  const sidebarOverlay = $('sidebarOverlay');
  const sidebarTitle = $('sidebarTitle');
  const sidebarBody = $('sidebarBody');
  const sidebarClose = $('sidebarClose');
  const contextMenu = $('contextMenu');
  const toastContainer = $('toastContainer');
  const findBar = $('findBar');
  const findInput = $('findInput');
  const findCount = $('findCount');

  // ===== UTILITAS =====
  function generateId() { return state.nextTabId++; }

  function showToast(message, icon = 'fa-circle-check') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function isUrl(str) {
    if (/^nova:\/\//.test(str)) return true;
    if (/^https?:\/\//i.test(str)) return true;
    if (/^[a-z0-9]([a-z0-9-]*[a-z0-9])?\.[a-z]{2,}/i.test(str)) return true;
    return false;
  }

  function normalizeUrl(str) {
    str = str.trim();
    if (/^nova:\/\//.test(str)) return str;
    if (/^https?:\/\//i.test(str)) return str;
    if (/^[a-z0-9]([a-z0-9-]*[a-z0-9])?\.[a-z]{2,}/i.test(str)) return 'https://' + str;
    // Ini pencarian
    const se = searchEngines[state.settings.searchEngine];
    return se.url + encodeURIComponent(str);
  }

  function getDomain(url) {
    try {
      if (/^nova:\/\//.test(url)) return 'NovaBrowser';
      const u = new URL(url);
      return u.hostname.replace('www.', '');
    } catch { return url; }
  }

  function getFaviconUrl(url) {
    try {
      if (/^nova:\/\//.test(url)) return '';
      const u = new URL(url);
      return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=32`;
    } catch { return ''; }
  }

  function saveState() {
    localStorage.setItem('nb_bookmarks', JSON.stringify(state.bookmarks));
    localStorage.setItem('nb_history', JSON.stringify(state.history));
    localStorage.setItem('nb_settings', JSON.stringify(state.settings));
  }

  function updateClock() {
    const now = new Date();
    statusTime.textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ===== TAB MANAGEMENT =====
  function createTab(url = 'nova://home', activate = true) {
    const id = generateId();
    const tab = {
      id,
      url,
      title: url === 'nova://home' ? 'Beranda' : getDomain(url),
      history: [url],
      historyIndex: 0,
      isLoading: false
    };
    state.tabs.push(tab);

    // Buat elemen iframe
    const frame = document.createElement('iframe');
    frame.className = 'browser-frame';
    frame.id = `frame-${id}`;
    frame.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';
    frame.setAttribute('referrerpolicy', 'no-referrer');
    contentArea.insertBefore(frame, findBar);

    // Buat elemen tab
    renderTabs();

    if (activate) switchTab(id);

    // Jika bukan halaman home, muat URL
    if (url !== 'nova://home') {
      loadUrlInTab(id, url);
    } else {
      showHomePage(id);
    }

    return id;
  }

  function closeTab(id) {
    const idx = state.tabs.findIndex(t => t.id === id);
    if (idx === -1) return;

    // Hapus iframe
    const frame = $(`frame-${id}`);
    if (frame) frame.remove();

    // Hapus home page
    const hp = $(`home-${id}`);
    if (hp) hp.remove();

    state.tabs.splice(idx, 1);

    if (state.tabs.length === 0) {
      createTab();
      return;
    }

    if (state.activeTabId === id) {
      const newIdx = Math.min(idx, state.tabs.length - 1);
      switchTab(state.tabs[newIdx].id);
    }

    renderTabs();
  }

  function switchTab(id) {
    state.activeTabId = id;
    const tab = getActiveTab();

    // Sembunyikan semua frame & home
    document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.home-page').forEach(f => f.classList.remove('active'));

    if (tab) {
      const frame = $(`frame-${tab.id}`);
      const hp = $(`home-${tab.id}`);

      if (tab.url === 'nova://home') {
        if (hp) hp.classList.add('active');
      } else {
        if (frame) frame.classList.add('active');
      }

      urlInput.value = tab.url === 'nova://home' ? '' : tab.url;
      updateUrlLock(tab.url);
      titleBarText.textContent = tab.title + ' — NovaBrowser';
      updateNavButtons();
    }

    renderTabs();
    updateBookmarkStar();
  }

  function getActiveTab() {
    return state.tabs.find(t => t.id === state.activeTabId);
  }

  function renderTabs() {
    // Hapus semua tab lama (kecuali tombol new)
    tabBar.querySelectorAll('.tab').forEach(t => t.remove());

    state.tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = `tab${tab.id === state.activeTabId ? ' active' : ''}`;
      el.dataset.id = tab.id;

      const favicon = getFaviconUrl(tab.url);
      const faviconHtml = favicon
        ? `<div class="tab-favicon"><img src="${favicon}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-globe\\'></i>'"></div>`
        : `<div class="tab-favicon"><i class="fas fa-house"></i></div>`;

      el.innerHTML = `
        ${faviconHtml}
        <span class="tab-title">${tab.title}</span>
        <button class="tab-close" data-close="${tab.id}"><i class="fas fa-xmark"></i></button>
      `;

      el.addEventListener('click', (e) => {
        if (!e.target.closest('.tab-close')) switchTab(tab.id);
      });
      el.querySelector('.tab-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(tab.id);
      });

      tabBar.insertBefore(el, newTabBtn);
    });
  }

  // ===== NAVIGASI =====
  function navigate(url) {
    const tab = getActiveTab();
    if (!tab) return;

    url = url.trim();
    if (!url) return;

    const finalUrl = isUrl(url) ? normalizeUrl(url) : normalizeUrl(url);
    tab.url = finalUrl;
    tab.title = getDomain(finalUrl);

    // Potong history ke depan
    tab.history = tab.history.slice(0, tab.historyIndex + 1);
    tab.history.push(finalUrl);
    tab.historyIndex = tab.history.length - 1;

    addToHistory(finalUrl, tab.title);
    loadUrlInTab(tab.id, finalUrl);
    updateNavButtons();
    renderTabs();
    updateBookmarkStar();
  }

  function loadUrlInTab(tabId, url) {
    const tab = state.tabs.find(t => t.id === tabId);
    if (!tab) return;

    tab.isLoading = true;
    showLoading(true);
    statusText.textContent = `Memuat ${getDomain(url)}...`;

    // Sembunyikan home page
    const hp = $(`home-${tabId}`);
    if (hp) hp.classList.remove('active');

    const frame = $(`frame-${tabId}`);
    if (frame) {
      frame.classList.add('active');
      frame.onload = () => {
        tab.isLoading = false;
        showLoading(false);
        statusText.textContent = 'Selesai';
        try {
          const title = frame.contentDocument?.title;
          if (title) tab.title = title;
        } catch(e) {}
        renderTabs();
        titleBarText.textContent = tab.title + ' — NovaBrowser';
      };
      frame.onerror = () => {
        tab.isLoading = false;
        showLoading(false);
        statusText.textContent = 'Gagal memuat halaman';
      };
      frame.src = url;
    }

    urlInput.value = url;
    updateUrlLock(url);
  }

  function showHomePage(tabId) {
    const tab = state.tabs.find(t => t.id === tabId);
    if (!tab) return;

    // Sembunyikan frame
    const frame = $(`frame-${tabId}`);
    if (frame) { frame.classList.remove('active'); frame.src = 'about:blank'; }

    // Buat atau tampilkan home page
    let hp = $(`home-${tabId}`);
    if (!hp) {
      hp = createHomePageElement(tabId);
      contentArea.insertBefore(hp, findBar);
    }
    hp.classList.add('active');

    tab.url = 'nova://home';
    tab.title = 'Beranda';
    urlInput.value = '';
    updateUrlLock('nova://home');
    titleBarText.textContent = 'Beranda — NovaBrowser';
    statusText.textContent = 'Siap';
  }

  function createHomePageElement(tabId) {
    const hp = document.createElement('div');
    hp.className = 'home-page';
    hp.id = `home-${tabId}`;

    let shortcutsHtml = defaultShortcuts.map(s => `
      <div class="shortcut" data-url="${s.url}">
        <div class="shortcut-icon" style="color:${s.color}"><i class="${s.icon}"></i></div>
        <div class="shortcut-name">${s.name}</div>
      </div>
    `).join('');

    let seButtonsHtml = Object.entries(searchEngines).map(([key, se]) => `
      <button class="se-btn${state.settings.searchEngine === key ? ' active' : ''}" data-se="${key}">
        <i class="${se.icon}"></i> ${se.name}
      </button>
    `).join('');

    hp.innerHTML = `
      <div class="home-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
      </div>
      <div class="home-content">
        <div class="home-logo">N</div>
        <div class="home-title">NovaBrowser</div>
        <div class="home-subtitle">Jelajahi internet dengan caramu sendiri</div>
        <div class="home-search">
          <i class="search-icon fas fa-magnifying-glass"></i>
          <input type="text" placeholder="Cari di web atau ketik URL..." class="home-search-input">
          <button class="search-go"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="search-engine-selector">${seButtonsHtml}</div>
        <div class="shortcuts-grid">${shortcutsHtml}</div>
      </div>
    `;

    // Event: Pencarian home
    const searchInput = hp.querySelector('.home-search-input');
    const searchGo = hp.querySelector('.search-go');
    const doHomeSearch = () => {
      const val = searchInput.value.trim();
      if (val) navigate(val);
    };
    searchGo.addEventListener('click', doHomeSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doHomeSearch(); });

    // Event: Search engine selector
    hp.querySelectorAll('.se-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.settings.searchEngine = btn.dataset.se;
        saveState();
        hp.querySelectorAll('.se-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showToast(`Search engine diubah ke ${searchEngines[btn.dataset.se].name}`, 'fa-search');
      });
    });

    // Event: Shortcuts
    hp.querySelectorAll('.shortcut').forEach(sc => {
      sc.addEventListener('click', () => navigate(sc.dataset.url));
    });

    return hp;
  }

  function goBack() {
    const tab = getActiveTab();
    if (!tab || tab.historyIndex <= 0) return;
    tab.historyIndex--;
    const url = tab.history[tab.historyIndex];
    tab.url = url;
    tab.title = getDomain(url);
    if (url === 'nova://home') {
      showHomePage(tab.id);
    } else {
      loadUrlInTab(tab.id, url);
    }
    updateNavButtons();
    renderTabs();
  }

  function goForward() {
    const tab = getActiveTab();
    if (!tab || tab.historyIndex >= tab.history.length - 1) return;
    tab.historyIndex++;
    const url = tab.history[tab.historyIndex];
    tab.url = url;
    tab.title = getDomain(url);
    if (url === 'nova://home') {
      showHomePage(tab.id);
    } else {
      loadUrlInTab(tab.id, url);
    }
    updateNavButtons();
    renderTabs();
  }

  function refreshPage() {
    const tab = getActiveTab();
    if (!tab) return;
    if (tab.url === 'nova://home') {
      showHomePage(tab.id);
    } else {
      loadUrlInTab(tab.id, tab.url);
    }
  }

  function goHome() {
    const tab = getActiveTab();
    if (!tab) return;
    tab.url = 'nova://home';
    tab.title = 'Beranda';
    showHomePage(tab.id);
    updateNavButtons();
    renderTabs();
    updateBookmarkStar();
  }

  function directOpen() {
    const tab = getActiveTab();
    if (!tab || tab.url === 'nova://home') {
      showToast('Tidak ada halaman untuk dibuka langsung', 'fa-circle-info');
      return;
    }
    window.open(tab.url, '_blank');
    showToast('Halaman dibuka di tab browser baru', 'fa-external-link-alt');
  }

  function updateNavButtons() {
    const tab = getActiveTab();
    $('btnBack').classList.toggle('disabled', !tab || tab.historyIndex <= 0);
    $('btnForward').classList.toggle('disabled', !tab || tab.historyIndex >= tab.history.length - 1);
  }

  function updateUrlLock(url) {
    if (/^https:\/\//i.test(url)) {
      urlLock.className = 'url-lock fas fa-lock';
      urlLock.style.color = 'var(--accent)';
    } else if (/^http:\/\//i.test(url)) {
      urlLock.className = 'url-lock fas fa-lock-open';
      urlLock.style.color = 'var(--warning)';
    } else {
      urlLock.className = 'url-lock fas fa-globe';
      urlLock.style.color = 'var(--fg-muted)';
    }
  }

  function showLoading(show) {
    if (show) {
      loadingBar.classList.add('active');
      loadingProgress.style.width = '0%';
      // Simulasi progress
      let prog = 0;
      const interval = setInterval(() => {
        prog += Math.random() * 25 + 5;
        if (prog >= 90) { prog = 90; clearInterval(interval); }
        loadingProgress.style.width = prog + '%';
      }, 200);
      loadingBar._interval = interval;
    } else {
      loadingProgress.style.width = '100%';
      if (loadingBar._interval) clearInterval(loadingBar._interval);
      setTimeout(() => {
        loadingBar.classList.remove('active');
        loadingProgress.style.width = '0%';
      }, 400);
    }
  }

  // ===== BOOKMARKS =====
  function toggleBookmark() {
    const tab = getActiveTab();
    if (!tab || tab.url === 'nova://home') return;

    const idx = state.bookmarks.findIndex(b => b.url === tab.url);
    if (idx >= 0) {
      state.bookmarks.splice(idx, 1);
      showToast('Bookmark dihapus', 'fa-bookmark');
    } else {
      state.bookmarks.push({ url: tab.url, title: tab.title, added: Date.now() });
      showToast('Halaman di-bookmark', 'fa-star');
    }
    saveState();
    updateBookmarkStar();
    renderBookmarksBar();
  }

  function updateBookmarkStar() {
    const tab = getActiveTab();
    const btn = $('btnBookmark');
    if (tab && state.bookmarks.some(b => b.url === tab.url)) {
      btn.classList.add('bookmarked');
      btn.innerHTML = '<i class="fas fa-star"></i>';
    } else {
      btn.classList.remove('bookmarked');
      btn.innerHTML = '<i class="far fa-star"></i>';
    }
  }

  function renderBookmarksBar() {
    bookmarksBar.innerHTML = '';
    if (!state.settings.showBookmarksBar) {
      bookmarksBar.style.display = 'none';
      return;
    }
    bookmarksBar.style.display = 'flex';
    state.bookmarks.forEach(bm => {
      const el = document.createElement('div');
      el.className = 'bookmark-item';
      el.innerHTML = `<i class="fas fa-globe"></i><span>${bm.title}</span>`;
      el.addEventListener('click', () => navigate(bm.url));
      bookmarksBar.appendChild(el);
    });
  }

  // ===== HISTORY =====
  function addToHistory(url, title) {
    if (/^nova:\/\//.test(url)) return;
    // Hindari duplikat berurutan
    if (state.history.length > 0 && state.history[0].url === url) return;
    state.history.unshift({ url, title, time: Date.now() });
    // Batasi 200 entri
    if (state.history.length > 200) state.history.length = 200;
    saveState();
  }

  function clearHistory() {
    state.history = [];
    saveState();
    showToast('Riwayat dibersihkan', 'fa-trash');
    if (state.sidebarPanel === 'history') openSidebar('history');
  }

  // ===== SIDEBAR =====
  function openSidebar(panel) {
    state.sidebarPanel = panel;
    sidebarTitle.textContent = panel === 'bookmarks' ? 'Bookmark' : panel === 'history' ? 'Riwayat' : 'Pengaturan';
    renderSidebarContent();
    sidebar.classList.add('active');
    sidebarOverlay.classList.add('active');
    state.sidebarOpen = true;
  }

  function closeSidebar() {
    sidebar.classList.remove('active');
    sidebarOverlay.classList.remove('active');
    state.sidebarOpen = false;
    state.sidebarPanel = null;
  }

  function renderSidebarContent() {
    sidebarBody.innerHTML = '';

    if (state.sidebarPanel === 'bookmarks') {
      if (state.bookmarks.length === 0) {
        sidebarBody.innerHTML = '<div class="panel-empty"><i class="far fa-bookmark"></i>Belum ada bookmark</div>';
        return;
      }
      state.bookmarks.slice().reverse().forEach((bm, i) => {
        const realIdx = state.bookmarks.length - 1 - i;
        const item = document.createElement('div');
        item.className = 'panel-item';
        item.innerHTML = `
          <div class="panel-item-icon"><i class="fas fa-globe"></i></div>
          <div class="panel-item-info">
            <div class="panel-item-title">${bm.title}</div>
            <div class="panel-item-url">${bm.url}</div>
          </div>
          <button class="panel-item-delete" data-bmidx="${realIdx}"><i class="fas fa-trash"></i></button>
        `;
        item.addEventListener('click', (e) => {
          if (!e.target.closest('.panel-item-delete')) navigate(bm.url);
        });
        item.querySelector('.panel-item-delete').addEventListener('click', (e) => {
          e.stopPropagation();
          state.bookmarks.splice(realIdx, 1);
          saveState();
          renderSidebarContent();
          renderBookmarksBar();
          updateBookmarkStar();
          showToast('Bookmark dihapus', 'fa-trash');
        });
        sidebarBody.appendChild(item);
      });
    }

    else if (state.sidebarPanel === 'history') {
      if (state.history.length === 0) {
        sidebarBody.innerHTML = '<div class="panel-empty"><i class="fas fa-clock-rotate-left"></i>Belum ada riwayat</div>';
        return;
      }
      state.history.forEach((h, i) => {
        const item = document.createElement('div');
        item.className = 'panel-item';
        const timeStr = new Date(h.time).toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        item.innerHTML = `
          <div class="panel-item-icon"><i class="fas fa-clock-rotate-left"></i></div>
          <div class="panel-item-info">
            <div class="panel-item-title">${h.title}</div>
            <div class="panel-item-url">${h.url}</div>
          </div>
          <span class="panel-item-time">${timeStr}</span>
        `;
        item.addEventListener('click', () => navigate(h.url));
        sidebarBody.appendChild(item);
      });

      // Tombol bersihkan
      const clearBtn = document.createElement('div');
      clearBtn.style.cssText = 'padding: 12px; text-align: center;';
      clearBtn.innerHTML = `<button style="padding:8px 20px;border-radius:8px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-family:'Space Grotesk',sans-serif;font-size:12px;cursor:pointer;transition:var(--transition)" onmouseover="this.style.background='rgba(255,71,87,0.15)'" onmouseout="this.style.background='transparent'"><i class="fas fa-trash"></i> Bersihkan Semua Riwayat</button>`;
      clearBtn.querySelector('button').addEventListener('click', clearHistory);
      sidebarBody.appendChild(clearBtn);
    }

    else if (state.sidebarPanel === 'settings') {
      // Search Engine
      let seHtml = `
        <div class="settings-section">
          <h4>Search Engine</h4>
          <div class="settings-row">
            <label>Mesin Pencari</label>
            <select class="settings-select" id="settSearchEngine">
              ${Object.entries(searchEngines).map(([k, v]) => `<option value="${k}"${state.settings.searchEngine === k ? ' selected' : ''}>${v.name}</option>`).join('')}
            </select>
          </div>
        </div>
      `;

      // Tampilan
      let displayHtml = `
        <div class="settings-section">
          <h4>Tampilan</h4>
          <div class="settings-row">
            <label>Tampilkan Bookmark Bar</label>
            <button class="toggle${state.settings.showBookmarksBar ? ' on' : ''}" id="settShowBmBar"></button>
          </div>
          <div class="settings-row">
            <label>Tampilkan Status Bar</label>
            <button class="toggle${state.settings.showStatusbar ? ' on' : ''}" id="settShowStatusBar"></button>
          </div>
        </div>
      `;

      // Data
      let dataHtml = `
        <div class="settings-section">
          <h4>Data</h4>
          <div class="settings-row">
            <label>Hapus semua bookmark</label>
            <button style="padding:4px 12px;border-radius:6px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:11px;cursor:pointer;font-family:'Space Grotesk',sans-serif" id="settClearBm">Hapus</button>
          </div>
          <div class="settings-row">
            <label>Hapus semua riwayat</label>
            <button style="padding:4px 12px;border-radius:6px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:11px;cursor:pointer;font-family:'Space Grotesk',sans-serif" id="settClearHist">Hapus</button>
          </div>
          <div class="settings-row">
            <label>Reset semua data</label>
            <button style="padding:4px 12px;border-radius:6px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:11px;cursor:pointer;font-family:'Space Grotesk',sans-serif" id="settResetAll">Reset</button>
          </div>
        </div>
      `;

      // Info
      let infoHtml = `
        <div class="settings-section">
          <h4>Tentang</h4>
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:4px">
            <label style="font-weight:600;color:var(--fg-primary)">NovaBrowser v1.0</label>
            <span style="font-size:11px;color:var(--fg-muted)">Browser kamu sendiri. Dibuat dengan HTML, CSS, dan JavaScript murni.</span>
            <span style="font-size:11px;color:var(--fg-muted)">Catatan: Beberapa situs memblokir pemuatan di iframe. Gunakan tombol "Buka Langsung" untuk membuka halaman di tab browser baru.</span>
          </div>
        </div>
      `;

      sidebarBody.innerHTML = seHtml + displayHtml + dataHtml + infoHtml;

      // Event: Settings
      $('settSearchEngine').addEventListener('change', (e) => {
        state.settings.searchEngine = e.target.value;
        saveState();
        showToast(`Search engine: ${searchEngines[e.target.value].name}`, 'fa-search');
      });

      $('settShowBmBar').addEventListener('click', function() {
        this.classList.toggle('on');
        state.settings.showBookmarksBar = this.classList.contains('on');
        saveState();
        renderBookmarksBar();
      });

      $('settShowStatusBar').addEventListener('click', function() {
        this.classList.toggle('on');
        state.settings.showStatusbar = this.classList.contains('on');
        saveState();
        document.querySelector('.status-bar').style.display = state.settings.showStatusbar ? 'flex' : 'none';
      });

      $('settClearBm').addEventListener('click', () => {
        state.bookmarks = [];
        saveState();
        renderBookmarksBar();
        updateBookmarkStar();
        showToast('Semua bookmark dihapus', 'fa-trash');
      });

      $('settClearHist').addEventListener('click', () => {
        clearHistory();
      });

      $('settResetAll').addEventListener('click', () => {
        state.bookmarks = [];
        state.history = [];
        state.settings = { searchEngine: 'google', showBookmarksBar: true, showStatusbar: true, homepage: 'nova://home' };
        saveState();
        renderBookmarksBar();
        updateBookmarkStar();
        showToast('Semua data direset', 'fa-trash');
        openSidebar('settings');
      });
    }

    else if (state.sidebarPanel === 'downloads') {
      sidebarBody.innerHTML = '<div class="panel-empty"><i class="fas fa-download"></i>Belum ada unduhan<br><span style="font-size:11px;margin-top:8px;display:block;opacity:0.7">Unduhan akan muncul di sini</span></div>';
    }
  }

  // ===== CONTEXT MENU =====
  function showContextMenu(x, y) {
    contextMenu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
    contextMenu.style.top = Math.min(y, window.innerHeight - 280) + 'px';
    contextMenu.classList.add('show');
    state.contextMenuVisible = true;
  }

  function hideContextMenu() {
    contextMenu.classList.remove('show');
    state.contextMenuVisible = false;
  }

  // ===== FIND BAR =====
  function toggleFindBar() {
    findBar.classList.toggle('active');
    if (findBar.classList.contains('active')) {
      findInput.focus();
    }
  }

  // ===== EVENT LISTENERS =====
  // Navigasi
  $('btnBack').addEventListener('click', goBack);
  $('btnForward').addEventListener('click', goForward);
  $('btnRefresh').addEventListener('click', refreshPage);
  $('btnHome').addEventListener('click', goHome);
  $('btnDirectOpen').addEventListener('click', directOpen);
  $('btnBookmark').addEventListener('click', toggleBookmark);
  newTabBtn.addEventListener('click', () => createTab());

  // URL Input
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      navigate(urlInput.value);
      urlInput.blur();
    }
  });
  urlInput.addEventListener('focus', () => {
    urlInput.select();
  });

  // Sidebar
  $('btnBookmarksPanel').addEventListener('click', () => openSidebar('bookmarks'));
  $('btnHistory').addEventListener('click', () => openSidebar('history'));
  $('btnSettings').addEventListener('click', () => openSidebar('settings'));
  $('btnDownloads').addEventListener('click', () => openSidebar('downloads'));
  sidebarClose.addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // Find
  $('btnFind').addEventListener('click', toggleFindBar);
  $('findClose').addEventListener('click', () => findBar.classList.remove('active'));
  findInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const tab = getActiveTab();
      if (!tab) return;
      const frame = $(`frame-${tab.id}`);
      if (frame && frame.contentDocument) {
        // Tidak bisa akses cross-origin, jadi beri info
        findCount.textContent = 'Cross-origin';
      } else {
        findCount.textContent = 'Tidak tersedia';
      }
    }
    if (e.key === 'Escape') findBar.classList.remove('active');
  });

  // Menu (gunakan context menu)
  $('btnMenu').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    showContextMenu(rect.right - 180, rect.bottom + 4);
  });

  // Context Menu actions
  contextMenu.querySelectorAll('.ctx-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      hideContextMenu();
      switch(action) {
        case 'newTab': createTab(); break;
        case 'reload': refreshPage(); break;
        case 'bookmark': toggleBookmark(); break;
        case 'copyUrl':
          const tab = getActiveTab();
          if (tab && tab.url !== 'nova://home') {
            navigator.clipboard.writeText(tab.url).then(() => showToast('URL disalin', 'fa-copy'));
          }
          break;
        case 'directOpen': directOpen(); break;
        case 'clearHistory': clearHistory(); break;
        case 'settings': openSidebar('settings'); break;
      }
    });
  });

  // Klik di luar context menu
  document.addEventListener('click', (e) => {
    if (state.contextMenuVisible && !contextMenu.contains(e.target) && !e.target.closest('#btnMenu')) {
      hideContextMenu();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ctrl+T: Tab baru
    if (e.ctrlKey && e.key === 't') {
      e.preventDefault();
      createTab();
    }
    // Ctrl+W: Tutup tab
    if (e.ctrlKey && e.key === 'w') {
      e.preventDefault();
      if (state.activeTabId) closeTab(state.activeTabId);
    }
    // Ctrl+L: Fokus URL bar
    if (e.ctrlKey && e.key === 'l') {
      e.preventDefault();
      urlInput.focus();
    }
    // Ctrl+R: Refresh
    if (e.ctrlKey && e.key === 'r') {
      e.preventDefault();
      refreshPage();
    }
    // Alt+Left: Back
    if (e.altKey && e.key === 'ArrowLeft') {
      e.preventDefault();
      goBack();
    }
    // Alt+Right: Forward
    if (e.altKey && e.key === 'ArrowRight') {
      e.preventDefault();
      goForward();
    }
    // Ctrl+F: Find
    if (e.ctrlKey && e.key === 'f') {
      e.preventDefault();
      toggleFindBar();
    }
    // Ctrl+D: Bookmark
    if (e.ctrlKey && e.key === 'd') {
      e.preventDefault();
      toggleBookmark();
    }
    // Ctrl+H: History
    if (e.ctrlKey && e.key === 'h') {
      e.preventDefault();
      openSidebar('history');
    }
    // Escape: Tutup sidebar / find bar
    if (e.key === 'Escape') {
      if (state.sidebarOpen) closeSidebar();
      if (findBar.classList.contains('active')) findBar.classList.remove('active');
      hideContextMenu();
    }
    // Ctrl+Tab: Tab berikutnya
    if (e.ctrlKey && e.key === 'Tab') {
      e.preventDefault();
      const idx = state.tabs.findIndex(t => t.id === state.activeTabId);
      const next = (idx + 1) % state.tabs.length;
      switchTab(state.tabs[next].id);
    }
    // Ctrl+Shift+Tab: Tab sebelumnya
    if (e.ctrlKey && e.shiftKey && e.key === 'Tab') {
      e.preventDefault();
      const idx = state.tabs.findIndex(t => t.id === state.activeTabId);
      const prev = (idx - 1 + state.tabs.length) % state.tabs.length;
      switchTab(state.tabs[prev].id);
    }
    // Ctrl+1-9: Pilih tab
    if (e.ctrlKey && e.key >= '1' && e.key <= '9') {
      e.preventDefault();
      const num = parseInt(e.key);
      if (num <= state.tabs.length) {
        switchTab(state.tabs[num - 1].id);
      }
    }
  });

  // Context menu pada content area
  contentArea.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showContextMenu(e.clientX, e.clientY);
  });

  // ===== INISIALISASI =====
  renderBookmarksBar();
  if (!state.settings.showStatusbar) {
    document.querySelector('.status-bar').style.display = 'none';
  }
  // Buat tab pertama
  createTab();

  // Tambah beberapa bookmark default jika kosong
  if (state.bookmarks.length === 0) {
    state.bookmarks = [
      { url: 'https://www.google.com', title: 'Google', added: Date.now() },
      { url: 'https://www.youtube.com', title: 'YouTube', added: Date.now() },
      { url: 'https://github.com', title: 'GitHub', added: Date.now() },
      { url: 'https://id.wikipedia.org', title: 'Wikipedia Indonesia', added: Date.now() },
    ];
    saveState();
    renderBookmarksBar();
  }
</script>
</body>
</html>
